# ── vitline-radius.service ────────────────────────────────────────────────────
# /etc/systemd/system/vitline-radius.service

[Unit]
Description=Vitline RADIUS Server
After=network.target mysql.service
Wants=mysql.service

[Service]
Type=simple
User=vitline
WorkingDirectory=/opt/vitline
Environment=PYTHONUNBUFFERED=1
EnvironmentFile=/etc/vitline/env
ExecStart=/opt/vitline/venv/bin/python main.py radius
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target


# ── vitline-portal.service ────────────────────────────────────────────────────
# /etc/systemd/system/vitline-portal.service

[Unit]
Description=Vitline Web Portal
After=network.target vitline-radius.service

[Service]
Type=simple
User=vitline
WorkingDirectory=/opt/vitline
Environment=PYTHONUNBUFFERED=1
EnvironmentFile=/etc/vitline/env
ExecStart=/opt/vitline/venv/bin/uvicorn portal.app:app --host 0.0.0.0 --port 8080 --workers 2
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# ── vitline-monitor.service ───────────────────────────────────────────────────
# /etc/systemd/system/vitline-monitor.service

[Unit]
Description=Vitline NetFlow Collector
After=network.target

[Service]
Type=simple
User=vitline
WorkingDirectory=/opt/vitline
EnvironmentFile=/etc/vitline/env
ExecStart=/opt/vitline/venv/bin/python main.py monitor
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# ── vitline-dns.service ───────────────────────────────────────────────────────
# /etc/systemd/system/vitline-dns.service

[Unit]
Description=Vitline DNS Resolver (CoreDNS)
After=network.target

[Service]
Type=simple
User=root
ExecStart=/usr/local/bin/coredns -conf /etc/vitline/Corefile
Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target


