# /etc/nginx/sites-available/vitline
#
# Nginx как TLS-терминатор для:
#   /          → личный кабинет (FastAPI :8080)
#   /wg        → WireGuard WebSocket туннель (:8443)
#   /metrics   → Grafana (:3000)  [только из локальной сети]
#
# Получить сертификат:
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d vpn.yourdomain.com

server {
    listen 80;
    server_name vpn.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vpn.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/vpn.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpn.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── личный кабинет ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WireGuard WebSocket туннель ───────────────────────────────────────────
    location /wg {
        proxy_pass          http://127.0.0.1:8443;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        tcp_nodelay         on;
    }

    # ── Grafana (только для админа) ───────────────────────────────────────────
    location /grafana/ {
        allow   10.0.0.0/8;
        allow   127.0.0.1;
        deny    all;
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
    }

    # ── безопасность ─────────────────────────────────────────────────────────
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;
    server_tokens off;

    # скрыть информацию о сервере (не светить что это Vitline)
    more_clear_headers Server;
}
