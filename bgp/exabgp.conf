# ── Безопасность ─────────────────────────────────────────────────────────────
# Фильтровать входящие префиксы ОБЯЗАТЕЛЬНО на уровне роутера/ExaBGP
# чтобы не принять bogon-маршруты или слишком специфичные /32.
# Пример prefix-list для Mikrotik — см. README_BGP.md
