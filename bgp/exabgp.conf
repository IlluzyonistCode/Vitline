# /etc/exabgp/exabgp.conf
#
# Шаблон конфига ExaBGP для приватного ISP.
# Подставь свои значения и скопируй в /etc/exabgp/exabgp.conf
#
# Установка ExaBGP:
#   pip install exabgp
#   exabgp --version

process isp-controller {
    run /usr/bin/python3 /opt/isp-radius/bgp/daemon.py \
        --router-id  203.0.113.1 \
        --local-as   65001 \
        --next-hop   203.0.113.1 \
        --announce   203.0.113.0/24 2001:db8::/48;
    encoder json;
}

# ── Пир с upstream-провайдером (IPv4) ────────────────────────────────────────
neighbor 198.51.100.1 {
    description  'Upstream transit';
    router-id    203.0.113.1;
    local-as     65001;
    peer-as      12345;            # AS аплинка
    local-address 203.0.113.1;

    family {
        ipv4 unicast;
        ipv6 unicast;
    }

    capability {
        graceful-restart;
    }

    api {
        processes [ isp-controller ];
        receive {
            parsed;
            update;
            state;
        }
    }
}

